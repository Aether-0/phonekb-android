name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK command-line tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip lib32stdc++6 lib32z1
          ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline.zip
          unzip -q /tmp/cmdline.zip -d $ANDROID_HOME/cmdline-tools
          yes | $ANDROID_HOME/cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleRelease --no-daemon --stacktrace
          gradle-version: '8.4'

      - name: Sign APK
        run: |
          set -e
          KEYSTORE=release.keystore
          KEYPASS=password
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair -v -keystore "$KEYSTORE" -storepass "$KEYPASS" -keypass "$KEYPASS" -alias phonekb -dname "CN=PhoneKB, OU=Dev, O=You, L=City, S=State, C=US" -keyalg RSA -keysize 2048 -validity 10000
          fi
          ANDR_HOME=${ANDROID_HOME:-$ANDROID_SDK_ROOT}
          BUILD_TOOLS=33.0.2
          ZIPALIGN="$ANDR_HOME/build-tools/$BUILD_TOOLS/zipalign"
          APKSIGNER="$ANDR_HOME/build-tools/$BUILD_TOOLS/apksigner"
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk
          if [ ! -f "$UNSIGNED" ]; then
            UNSIGNED=app/build/outputs/apk/release/app-release.apk
          fi
          if [ ! -f "$UNSIGNED" ]; then
            echo "Unsigned APK not found at expected paths"; exit 1
          fi
          echo "Using tools: $ZIPALIGN and $APKSIGNER"
          "$ZIPALIGN" -v -p 4 "$UNSIGNED" app/build/outputs/apk/release/app-release-aligned.apk
          "$APKSIGNER" sign --ks "$KEYSTORE" --ks-pass pass:$KEYPASS --key-pass pass:$KEYPASS --out app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/app-release-aligned.apk
          echo "Signed APK: app/build/outputs/apk/release/app-release-signed.apk"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release-signed.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
